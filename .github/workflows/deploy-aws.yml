# Build Docker images and push to Amazon ECR. Wire ECS/App Runner to pull :latest or :sha tags.
#
# Prerequisites (once per AWS account):
# - ECR repositories meetmi-backend / meetmi-frontend (created by workflow if missing)
# - GitHub OIDC provider + IAM role trusted by this repo (see README)
# - GitHub secrets: AWS_REGION, AWS_ROLE_TO_ASSUME
# - GitHub variable (optional): VITE_API_URL — defaults to /api (same-origin proxy). Set when you have a public API URL.
# - GitHub variable (optional): SKIP_FRONTEND_DEPLOY = true — push backend image only

name: Deploy to AWS (ECR)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  push-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION }}

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          for repo in meetmi-backend meetmi-frontend; do
            if aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              echo "ECR repository exists: $repo"
            else
              echo "Creating ECR repository: $repo"
              aws ecr create-repository \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true \
                --encryption-configuration encryptionType=AES256
            fi
          done

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          echo "registry=${{ steps.ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
        run: |
          docker build -t "$REGISTRY/meetmi-backend:$SHA_TAG" -t "$REGISTRY/meetmi-backend:latest" backend
          docker push "$REGISTRY/meetmi-backend:$SHA_TAG"
          docker push "$REGISTRY/meetmi-backend:latest"

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
          SKIP_FRONTEND: ${{ vars.SKIP_FRONTEND_DEPLOY }}
        run: |
          set -euo pipefail
          if [ "${SKIP_FRONTEND:-}" = "true" ]; then
            echo "Skipping frontend image (SKIP_FRONTEND_DEPLOY=true). Backend image was still pushed."
            exit 0
          fi
          VITE_API_URL="${{ vars.VITE_API_URL }}"
          if [ -z "$VITE_API_URL" ]; then
            VITE_API_URL="/api"
            echo "::warning::VITE_API_URL not set — building frontend with /api (same host). When you have a public API URL (App Runner, ALB, or custom domain), set repository Variable VITE_API_URL and redeploy the frontend image."
          fi
          docker build \
            --build-arg "VITE_API_URL=$VITE_API_URL" \
            -t "$REGISTRY/meetmi-frontend:$SHA_TAG" \
            -t "$REGISTRY/meetmi-frontend:latest" \
            frontend
          docker push "$REGISTRY/meetmi-frontend:$SHA_TAG"
          docker push "$REGISTRY/meetmi-frontend:latest"

      - name: Roll out new images on ECS (database unchanged)
        env:
          CLUSTER: ${{ vars.AWS_ECS_CLUSTER }}
          BACKEND_SVC: ${{ vars.AWS_ECS_SERVICE_BACKEND }}
          FRONTEND_SVC: ${{ vars.AWS_ECS_SERVICE_FRONTEND }}
        run: |
          set -euo pipefail
          if [ -z "${CLUSTER:-}" ]; then
            echo "::warning::Images are in ECR only. Provision ECS with infra/terraform (see infra/terraform/README.md) or docs/aws-ecs-console-setup.md, then set Variables: AWS_ECS_CLUSTER, AWS_ECS_SERVICE_BACKEND, AWS_ECS_SERVICE_FRONTEND."
            exit 0
          fi
          if [ -z "${BACKEND_SVC:-}" ] || [ -z "${FRONTEND_SVC:-}" ]; then
            echo "::error::Set AWS_ECS_SERVICE_BACKEND and AWS_ECS_SERVICE_FRONTEND repository Variables (e.g. meetmi-backend, meetmi-frontend)."
            exit 1
          fi
          echo "Forcing new deployment (pulls meetmi-backend:latest and meetmi-frontend:latest; RDS is not restarted)."
          aws ecs update-service --cluster "$CLUSTER" --service "$BACKEND_SVC" --force-new-deployment --output text --query 'service.serviceName'
          aws ecs update-service --cluster "$CLUSTER" --service "$FRONTEND_SVC" --force-new-deployment --output text --query 'service.serviceName'
          echo "Watch rollout: ECS → Clusters → $CLUSTER → each service → Deployments tab."
          if [ -n "${{ vars.PUBLIC_APP_URL }}" ]; then
            echo "App URL (if configured): ${{ vars.PUBLIC_APP_URL }}"
          fi

      - name: Seed database on ECS
        if: ${{ vars.AWS_ECS_CLUSTER != '' && vars.AWS_ECS_SERVICE_BACKEND != '' && vars.AWS_ECS_SERVICE_FRONTEND != '' }}
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
          AWS_ECS_CLUSTER: ${{ vars.AWS_ECS_CLUSTER }}
          AWS_ECS_SERVICE_BACKEND: ${{ vars.AWS_ECS_SERVICE_BACKEND }}
          PROJECT_NAME: meetmi
          ENVIRONMENT: dev
        run: ./scripts/ecs-seed.sh

      - name: Verify public API
        if: ${{ vars.PUBLIC_APP_URL != '' }}
        env:
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          HEALTH="$(curl -fsS "$PUBLIC_APP_URL/api/health")"
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"database":"connected"'
          curl -fsS \
            -H 'Content-Type: application/json' \
            -d '{"email":"user@meetmi.example.com","password":"UserPass123"}' \
            "$PUBLIC_APP_URL/api/auth/login" | grep -q 'access_token'
