name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start backend stack
        run: docker compose up -d postgres backend
      - name: Wait for backend and seed database
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/health >/dev/null; then
              docker compose exec -T backend python -m app.seed
              exit 0
            fi
            if ! docker compose ps backend --status running | grep -q backend; then
              echo "Backend container is not running."
              docker compose logs postgres backend
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend did not become healthy in time."
              docker compose logs postgres backend
              exit 1
            fi
            sleep 2
          done
          docker compose logs postgres backend
          exit 1
      - name: Run Playwright E2E
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api
        run: npm run test:e2e
